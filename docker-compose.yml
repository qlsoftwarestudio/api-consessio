version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: concessio-postgres
    environment:
      POSTGRES_DB: concessio
      POSTGRES_USER: concessio
      POSTGRES_PASSWORD: concessio123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concessio -d concessio"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: concessio-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/concessio
      SPRING_DATASOURCE_USERNAME: concessio
      SPRING_DATASOURCE_PASSWORD: concessio123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: concessio-super-secret-key-for-jwt-tokens-2026
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
