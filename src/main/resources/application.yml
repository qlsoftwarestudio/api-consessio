spring:
  application:
    name: concessio
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:concessio}
    username: ${PGUSER:concessio}
    password: ${PGPASSWORD:concessio123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000

  jpa:
    hibernate:
    ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
          # Configuración para persistencia y rendimiento
          jdbc:
            batch_size: 20
            order_inserts: true
            order_updates: true
          # Multi-tenancy
          tenant_identifier_resolver: com.logiair.os.tenant.TenantIdentifierResolver
          # Cache para mejor rendimiento
          cache:
            use_second_level_cache: true
            use_query_cache: true
            region:
              factory_class: org.hibernate.cache.jcache.JCacheRegionFactory

 # Configuración del servidor
 server:
    port: ${PORT:8080}
    servlet:
      context-path: /
    # Configuración para producción
    compression:
      enabled: true
      mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/json,application/xml

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:changeme_in_production}
  expiration: ${JWT_EXPIRATION:86400000}

# Logging Configuration
logging:
  level:
    com.concessio.crm: ${APP_LOG_LEVEL:INFO}
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# App Configuration
app:
  storage:
    path: ${APP_STORAGE_PATH:./uploads}
