spring:
  application:
    name: concessio
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:concessio}
    username: ${DB_USER:concessio}
    password: ${DB_PASSWORD:concessio123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    

server:
  port: ${PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/json,application/xml

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:changeme_in_production}
  expiration: ${JWT_EXPIRATION:86400000}

# Logging Configuration
logging:
  level:
    com.concessio.crm: ${APP_LOG_LEVEL:INFO}
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# App Configuration
app:
  storage:
    provider: ${STORAGE_PROVIDER:local}  # 'local' o 'r2'
    path: ${APP_STORAGE_PATH:./uploads}
    r2:
      endpoint: ${R2_ENDPOINT:}
      access-key: ${R2_ACCESS_KEY:}
      secret-key: ${R2_SECRET_KEY:}
      bucket: ${R2_BUCKET:concessio-documents}
      public-url: ${R2_PUBLIC_URL:}
